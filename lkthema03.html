<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Lernkartei: О русском по-русски</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #e8f5e9;
            --dark-green: #1b5e20;
            --accent-green: #81c784;
            --bg-color: #f1f8e9;
            --card-shadow: rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--dark-green);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .progress {
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary-green);
            font-size: 1.1rem;
        }

        /* Flashcard 3D Flip Container */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 350px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 25px var(--card-shadow);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            border-radius: 20px;
            border: 4px solid var(--primary-green);
            background-color: white;
        }

        .card-front {
            color: var(--dark-green);
        }

        .card-back {
            background-color: var(--light-green);
            color: var(--dark-green);
            transform: rotateY(180deg);
        }

        .text-rus {
            font-weight: bold;
            line-height: 1.2;
            word-wrap: break-word;
        }

        .text-de {
            font-size: 2rem;
            line-height: 1.2;
        }

        .note {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            flex: 1;
            min-width: 120px;
        }

        button:hover {
            background-color: var(--dark-green);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background-color: var(--accent-green);
        }

        .btn-secondary:hover {
            background-color: var(--primary-green);
        }

        /* Instructions for desktop */
        .instructions {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #555;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .flashcard-container {
                height: 300px;
            }
            .text-de {
                font-size: 1.6rem;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>О русском по-русски</h1>
        
        <div class="progress" id="progress">1 / 85</div>

        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <div id="front-text" class="text-rus">Загрузка...</div>
                </div>
                <div class="card-face card-back">
                    <div id="back-text" class="text-de">Laden...</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">← Vorherige</button>
            <button onclick="nextCard()">Nächste →</button>
            <button class="btn-secondary" onclick="shuffleCards()">Mischen</button>
            <button class="btn-secondary" onclick="resetToStart()">An den Anfang</button>
        </div>

        <div class="instructions">
            ⌨️ <b>Tastatur:</b> Pfeiltasten für Navigation | Leertaste/Enter zum Umdrehen | Pos1 für Anfang
        </div>
    </div>

    <script>
        const rawData = `1.	страна́ – Land
2.	столи́ца – Hauptstadt
3.	го́род – Stadt
4.	родно́й го́род – Heimatstadt
5.	часть – Teil
6.	европе́йская – europäisch
7.	ю́жная – südlich
8.	восто́чная – östlich
9.	мо́ре – Meer
10.	о́зеро – See
11.	го́ры – Gebirge
12.	мегапо́лис – Metropole
13.	Росси́я – Russland
14.	Москва́ – Moskau
15.	Ейск – Jeisk
16.	Байка́л – Baikalsee
17.	Камча́тка – Kamtschatka
18.	Кра́сная пло́щадь – Roter Platz
19.	Кремль – Kreml
20.	Петерго́ф – Peterhof
21.	Доли́на ге́йзеров – Tal der Geysire
22.	Мама́ев курга́н – Mamajew-Kurgan
23.	Кунгу́рская пеще́ра – Kungurer Eishöhle
24.	достопримеча́тельность – Sehenswürdigkeit
25.	жи́тель – Einwohner
26.	наро́д – Volk
27.	национа́льность – Nationalität
28.	ру́сский / ру́сская – Russe / Russin
29.	язы́к – Sprache
30.	государстве́нный – staatlich
31.	изве́стный – bekannt / berühmt
32.	челове́к – Mensch
33.	поэ́т – Dichter
34.	писа́тель – Schriftsteller
35.	худо́жник – Maler / Künstler
36.	спортсме́н – Sportler
37.	певе́ц – Sänger
38.	еда́ – Essen / Speise
39.	национа́льное блю́до – Nationalgericht
40.	борщ – Borschtsch
41.	блины́ – Blinis (russische Pfannkuchen)
42.	сала́т оли́вье – Salat Olivier
43.	винегре́т – Vinaigrette (Rote-Bete-Salat)
44.	селе́дка под шу́бой – Hering im Pelzmantel
45.	икра́ – Kaviar
46.	смета́на – Schmand / saure Sahne
47.	ма́сло – Butter / Öl
48.	варе́нье – Konfitüre / Marmelade
49.	начи́нка – Füllung
50.	тради́ция – Tradition
51.	пра́здник – Feiertag / Fest
52.	Но́вый год – Neujahr
53.	Ма́сленица – Masleniza (Frühlingsfest)
54.	зима́ – Winter
55.	весна́ – Frühling
56.	свобо́дное вре́мя – Freizeit
57.	на́бережная – Uferpromenade
58.	па́мятник – Denkmal
59.	санато́рий – Sanatorium
60.	като́к – Eisbahn
61.	коньки́ – Schlittschuhe
62.	говори́ть / сказа́ть – sprechen / sagen
63.	расска́зывать / рассказа́ть – erzählen
64.	учи́ть / научи́ть – lehren / beibringen
65.	учи́ться / научи́ться – lernen / studieren
66.	знать / узна́ть – wissen / erfahren
67.	слы́шать / услы́шать – hören
68.	ви́деть / уви́деть – sehen
69.	гото́вить / пригото́вить – zubereiten / kochen
70.	печь / испе́чь – backen
71.	есть / съесть – essen
72.	пить / вы́пить – trinken
73.	жить / прожи́ть – leben
74.	рабо́тать / порабо́тать – arbeiten
75.	гуля́ть / погуля́ть – spazieren gehen
76.	приезжа́ть / прие́хать – ankommen / hinfahren
77.	быва́ть / побыва́ть – besuchen / weilen
78.	находи́ться / найти́сь – sich befinden
79.	называ́ться / назва́ться – heißen / sich nennen
80.	располага́ться / расположи́ться – liegen / sich befinden
81.	ката́ться / поката́ться – fahren / gleiten
82.	занима́ться / заня́ться – sich beschäftigen / Sport treiben
83.	пра́здновать / отпра́здновать – feiern
84.	выключа́ть / вы́ключить – ausschalten
85.	испо́льзовать / воспо́льзоваться – benutzen / verwenden`;

        let cards = [];
        let currentIndex = 0;
        let isFlipped = false;

        // Init cards
        function initData() {
            const lines = rawData.split('\n');
            cards = lines.map(line => {
                // Regex to split by the first " – "
                const match = line.replace(/^\d+\.\t/, '').split(' – ');
                return {
                    rus: match[0].trim(),
                    de: match[1].trim()
                };
            });
            updateUI();
        }

        function updateUI() {
            const cardElement = document.getElementById('card');
            const frontText = document.getElementById('front-text');
            const backText = document.getElementById('back-text');
            const progress = document.getElementById('progress');

            // Reset flip state
            isFlipped = false;
            cardElement.classList.remove('flipped');

            // Set texts
            const currentCard = cards[currentIndex];
            frontText.innerText = currentCard.rus;
            backText.innerText = currentCard.de;

            // Dynamic font sizing
            adjustFontSize(frontText, currentCard.rus.length);
            adjustFontSize(backText, currentCard.de.length);

            // Update Progress
            progress.innerText = `${currentIndex + 1} / ${cards.length}`;
        }

        function adjustFontSize(element, length) {
            if (length > 30) {
                element.style.fontSize = "1.4rem";
            } else if (length > 20) {
                element.style.fontSize = "1.8rem";
            } else {
                element.style.fontSize = "2.4rem";
            }
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('card').classList.toggle('flipped');
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                updateUI();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        function shuffleCards() {
            // Fisher-Yates Shuffle
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            updateUI();
        }

        function resetToStart() {
            currentIndex = 0;
            updateUI();
        }

        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ':
                case 'Enter':
                    e.preventDefault(); // Prevent scrolling on space
                    flipCard();
                    break;
                case 'ArrowLeft':
                    prevCard();
                    break;
                case 'ArrowRight':
                    nextCard();
                    break;
                case 'Home':
                    resetToStart();
                    break;
            }
        });

        // Start
        initData();
    </script>
</body>
</html>
