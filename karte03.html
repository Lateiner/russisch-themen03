<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта: Слушай и учись</title>
    <style>
        :root {
            --primary-blue: #0055a4;
            --russian-red: #d52b1e;
            --gold: #ffcc00;
            --bg-color: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Neue Überschrift laut Wunsch */
        h1 { 
            color: var(--primary-blue); 
            text-align: center; 
            font-size: 1.5rem; 
            margin: 15px 0; 
            max-width: 90%;
        }

        /* Karten-Rahmen */
        .map-wrapper {
            position: relative;
            display: inline-block;
            line-height: 0;
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            background-color: white;
            overflow: hidden;
            border: 3px solid #fff;
        }

        .map-img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Interaktive Pins */
        .pin {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: var(--russian-red);
            border: 2px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg) translate(50%, -50%);
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: -2px 2px 5px rgba(0,0,0,0.3);
        }

        .pin:hover {
            background-color: var(--gold);
            transform: rotate(-45deg) translate(50%, -50%) scale(1.3);
        }

        /* Pulsieren für Aufmerksamkeit */
        .pin::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: inherit;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        /* Positionen der Pins */
        #p-spb       { top: 43.5%; left: 13.5%; }
        #p-moscow    { top: 55.5%; left: 16.5%; }
        #p-yeysk     { top: 66.5%; left: 5.5%; }
        #p-volgograd { top: 65.5%; left: 18.5%; }
        #p-kungur    { top: 57.5%; left: 30.5%; }
        #p-baikal    { top: 75.5%; left: 61.5%; }
        #p-kamchatka { top: 45.5%; left: 92.5%; }

        /* Info-Box Display */
        .info-card {
            margin-top: 25px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 95%;
            max-width: 750px;
            min-height: 130px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.06);
            border-bottom: 8px solid var(--primary-blue);
            text-align: center;
            position: relative;
        }

        #loc-name { color: var(--primary-blue); font-weight: bold; font-size: 1.4rem; margin-bottom: 12px; }
        #loc-text { color: #333; line-height: 1.7; font-size: 1.15rem; }

        .audio-icon { font-size: 1.2rem; vertical-align: middle; margin-left: 10px; opacity: 0.6; }

        @media (max-width: 600px) {
            .pin { width: 16px; height: 16px; }
            h1 { font-size: 1.2rem; }
            #loc-name { font-size: 1.2rem; }
            #loc-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <h1>Klicke auf die Markierungen, um die Orte zu entdecken.</h1>

    <div class="map-wrapper">
        <!-- Dein Bild -->
        <img src="russland_karte_clean.jpg" alt="Russland Karte" class="map-img">
        
        <!-- Pins -->
        <div class="pin" id="p-spb" onclick="handleAction(0)"></div>
        <div class="pin" id="p-moscow" onclick="handleAction(1)"></div>
        <div class="pin" id="p-yeysk" onclick="handleAction(2)"></div>
        <div class="pin" id="p-volgograd" onclick="handleAction(3)"></div>
        <div class="pin" id="p-kungur" onclick="handleAction(4)"></div>
        <div class="pin" id="p-baikal" onclick="handleAction(5)"></div>
        <div class="pin" id="p-kamchatka" onclick="handleAction(6)"></div>
    </div>

    <div class="info-card" id="infoBox">
        <div id="loc-name">Добро пожаловать!</div>
        <div id="loc-text">Wähle einen Ort auf der Karte aus, um die Beschreibung zu hören.</div>
    </div>

    <script>
        const locations = [
            { n: "Петергоф (Peterhof)", t: "Это место находится около Санкт-Петербурга. Петергоф очень знаменит своими красивыми фонтанами." },
            { n: "Москва (Moskau)", t: "Столица России. Здесь на Красной площади расположены Кремль и Собор Василия Блаженного." },
            { n: "Ейск (Jeisk)", t: "Родной город Иры. Это маленький и очень зелёный курортный город на берегу Азовского моря." },
            { n: "Волгоград (Wolgograd)", t: "В этом городе находится Мамаев курган — один из самых главных памятников истории в стране." },
            { n: "Кунгур (Kungur)", t: "Здесь находится знаменитая Кунгурская ледяная пещера. Это удивительное место в Пермской области." },
            { n: "Озеро Байкал (Baikalsee)", t: "Самое глубокое озеро на планете. Оно находится в Сибири и содержит очень чистую воду." },
            { n: "Камчатка (Kamtschatka)", t: "Полуостров на востоке России. Там находится Долина гейзеров — уникальный природный заповедник." }
        ];

        let maleVoice = null;

        // Stimme laden
        function setupVoice() {
            const voices = window.speechSynthesis.getVoices();
            // Suche russische männliche Stimme
            maleVoice = voices.find(v => v.lang.startsWith('ru') && 
                (v.name.includes('Male') || v.name.includes('Maxim') || v.name.includes('Pavel'))) || 
                voices.find(v => v.lang.startsWith('ru'));
        }

        window.speechSynthesis.onvoiceschanged = setupVoice;
        setupVoice();

        function speakText(text) {
            window.speechSynthesis.cancel(); // Stoppt laufende Sprachausgabe
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = maleVoice;
            utterance.lang = 'ru-RU';
            utterance.pitch = 0.8; // Macht die Stimme männlicher/tiefer
            utterance.rate = 0.9;  // Etwas langsamer für Schüler
            window.speechSynthesis.speak(utterance);
        }

        function handleAction(i) {
            const box = document.getElementById('infoBox');
            const nameEl = document.getElementById('loc-name');
            const textEl = document.getElementById('loc-text');

            // Text aktualisieren
            nameEl.innerHTML = locations[i].n + ' <span class="audio-icon">🔊</span>';
            textEl.innerText = locations[i].t;

            // Box-Animation
            box.style.transform = "scale(1.02)";
            setTimeout(() => { box.style.transform = "scale(1)"; }, 200);

            // Sprachausgabe starten
            speakText(locations[i].t);
        }
    </script>
</body>
</html>
