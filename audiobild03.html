<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hörverstehen: Bilder zuordnen</title>
    <style>
        :root {
            --primary-blue: #0055a4;
            --russian-red: #d52b1e;
            --success-green: #28a745;
            --bg-color: #f4f7f6;
            --btn-gray: #6c757d;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { color: var(--primary-blue); text-align: center; font-size: 1.6rem; margin-bottom: 5px; }
        .instruction { color: #555; margin-bottom: 20px; text-align: center; font-size: 0.95rem; }

        /* Audio & Control Sektion */
        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 350px;
        }

        #play-btn {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }

        #play-btn:hover:not(:disabled) { background-color: #003d7a; transform: scale(1.05); }
        #play-btn:disabled { background-color: #ccc; cursor: default; }

        #status-msg { 
            font-weight: bold; 
            font-size: 1rem; 
            height: 1.5rem; 
            text-align: center; 
            margin-bottom: 15px;
            color: #333;
        }

        #restart-btn {
            background-color: var(--btn-gray);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        #restart-btn:hover { background-color: #5a6268; }

        /* Bilder-Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
        }

        .img-card {
            background: white;
            border: 4px solid transparent;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .img-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        /* Zustände */
        .correct { border-color: var(--success-green); opacity: 0.3; pointer-events: none; }
        .wrong { border-color: var(--russian-red); animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @media (max-width: 500px) {
            .image-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            #play-btn { width: 70px; height: 70px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <h1>Послушай и выбери</h1>
    <p class="instruction">Klicke auf den blauen Button und wähle das passende Bild.</p>

    <div class="control-panel">
        <button id="play-btn" title="Hören">🔊</button>
        <div id="status-msg">Lädt...</div>
        <button id="restart-btn" onclick="resetGame()">Neustart</button>
    </div>

    <div class="image-grid" id="imageGrid"></div>

    <script>
        const items = [
            { id: 1, word: "Озеро Байкал", img: "bild1.jpg" },
            { id: 2, word: "Блины", img: "bild2.jpg" },
            { id: 3, word: "Борщ", img: "bild3.jpg" },
            { id: 4, word: "Кремль", img: "bild4.jpg" },
            { id: 5, word: "Петергоф", img: "bild5.jpg" },
            { id: 6, word: "Пушкин", img: "bild6.jpg" },
            { id: 7, word: "Красная площадь", img: "bild7.jpg" },
            { id: 8, word: "Салат оливье", img: "bild8.jpg" },
            { id: 9, word: "Масленица", img: "bild9.jpg" },
            { id: 10, word: "Метро", img: "bild10.jpg" }
        ];

        let currentTarget = null;
        let maleVoice = null;

        function getVoice() {
            const voices = window.speechSynthesis.getVoices();
            // Suche russische männliche Stimme (Maxim, Pavel, Male)
            return voices.find(v => v.lang.startsWith('ru') && 
                (v.name.toLowerCase().includes('male') || 
                 v.name.toLowerCase().includes('maxim') || 
                 v.name.toLowerCase().includes('pavel'))) || 
                 voices.find(v => v.lang.startsWith('ru'));
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.voice = getVoice();
            msg.lang = 'ru-RU';
            msg.pitch = 0.75; // Tieferer Ton für männlichen Klang
            msg.rate = 0.85; // Etwas langsamer für Schüler
            window.speechSynthesis.speak(msg);
        }

        function renderImages() {
            const grid = document.getElementById('imageGrid');
            grid.innerHTML = '';
            // Mische die Bilder bei jedem Rendering/Neustart
            [...items].sort(() => Math.random() - 0.5).forEach(item => {
                const card = document.createElement('div');
                card.className = 'img-card';
                card.id = "card-" + item.id;
                card.innerHTML = `<img src="${item.img}" alt="Auswahl">`;
                card.onclick = () => check(card, item.id);
                grid.appendChild(card);
            });
        }

        function pickNext() {
            const status = document.getElementById('status-msg');
            const left = items.filter(i => !i.solved);
            
            if (left.length === 0) {
                status.innerText = "Молодец! Alles gefunden.";
                status.style.color = "var(--success-green)";
                document.getElementById('play-btn').disabled = true;
                return;
            }
            
            currentTarget = left[Math.floor(Math.random() * left.length)];
            status.innerText = "Klick auf 🔊 und höre zu.";
            status.style.color = "#333";
        }

        function check(card, id) {
            if (!currentTarget) return;
            const status = document.getElementById('status-msg');

            if (id === currentTarget.id) {
                card.classList.add('correct');
                status.innerText = "Правильно!";
                status.style.color = "var(--success-green)";
                currentTarget.solved = true;
                setTimeout(pickNext, 1200);
            } else {
                card.classList.add('wrong');
                status.innerText = "Нет, попробуй ещё раз.";
                status.style.color = "var(--russian-red)";
                setTimeout(() => card.classList.remove('wrong'), 500);
            }
        }

        function resetGame() {
            items.forEach(i => i.solved = false);
            document.getElementById('play-btn').disabled = false;
            renderImages();
            pickNext();
        }

        // Event-Listener für Play-Button
        document.getElementById('play-btn').onclick = () => {
            if (currentTarget) speak(currentTarget.word);
        };

        // Stimmen laden oft asynchron
        window.speechSynthesis.onvoiceschanged = () => {
            document.getElementById('status-msg').innerText = "Bereit zum Start!";
        };

        // Start
        renderImages();
        pickNext();
    </script>
</body>
</html>
